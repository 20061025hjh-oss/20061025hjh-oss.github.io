<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>国家安全教育随机答题系统</title><style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:linear-gradient(135deg,#eef4ff,#f8fbff);color:#152033}.wrap{max-width:980px;margin:auto;padding:22px}.hero,.card,.bar{background:rgba(255,255,255,.94);border:1px solid #dce4f3;border-radius:24px;box-shadow:0 18px 40px rgba(25,60,140,.12)}.hero{padding:28px;margin-bottom:18px}.tag{color:#245bdb;font-weight:800;font-size:13px;letter-spacing:.04em}h1{font-size:clamp(28px,7vw,48px);margin:10px 0}h2{font-size:30px;margin:0 0 12px}p{line-height:1.7;color:#66728a}.blue{background:linear-gradient(135deg,#1f57dc,#3b82ff);color:white;border-radius:20px;padding:22px;margin-top:18px;font-size:28px;font-weight:900}.blue small{display:block;font-size:16px;opacity:.8;margin-bottom:8px}.card{padding:24px;margin:18px 0}label{display:block;font-weight:800;margin:16px 0 8px}input[type=text]{width:100%;padding:15px;border:1px solid #dce4f3;border-radius:16px;font-size:18px}button{border:0;border-radius:16px;padding:14px 18px;font-weight:900;font-size:17px;margin:6px 6px 6px 0}.pri{background:linear-gradient(135deg,#245bdb,#3b82ff);color:#fff}.sec{background:#edf3ff;color:#17419f}.ghost{background:#fff;border:1px solid #dce4f3;color:#152033}.hidden{display:none!important}.top{position:sticky;top:0;z-index:10;margin:0 -22px 16px;padding:12px 22px;background:rgba(238,244,255,.9);backdrop-filter:blur(8px)}.bar{padding:14px;display:flex;justify-content:space-between;gap:8px;align-items:center}.q{background:#fff;border:1px solid #dce4f3;border-radius:18px;padding:18px;margin:14px 0}.qt{font-weight:900;line-height:1.75}.type{color:#245bdb;font-size:13px;font-weight:900}.opt{display:flex;gap:10px;align-items:flex-start;border:1px solid #dce4f3;border-radius:14px;background:#fbfcff;padding:11px;margin:9px 0;font-weight:500;line-height:1.55}.opt input{margin-top:4px;accent-color:#245bdb}.score{font-size:64px;font-weight:950;color:#245bdb}.ok{color:#12834f;font-weight:900}.bad{color:#c93535;font-weight:900}table{width:100%;border-collapse:collapse;background:#fff;border-radius:18px;overflow:hidden}th,td{border-bottom:1px solid #dce4f3;padding:12px;text-align:left}th{background:#edf3ff;color:#17419f}.pod{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.medal{border-radius:20px;padding:18px;color:#fff;font-weight:900}.m1{background:linear-gradient(135deg,#ffb703,#fb8500)}.m2{background:linear-gradient(135deg,#64748b,#94a3b8)}.m3{background:linear-gradient(135deg,#b45309,#d97706)}@media(max-width:700px){.wrap{padding:14px}.pod{grid-template-columns:1fr}button{width:100%;margin:6px 0}.bar{display:block}}
</style></head><body><div class="wrap"><section id="home"><div class="hero"><div class="tag">National Security Education Quiz</div><h1>国家安全教育随机答题系统</h1><p>每次随机抽取 <b>50</b> 题，每题 <b>2</b> 分，满分 <b>100</b> 分。提交后显示正确答案、错题与排行榜。</p><div class="blue"><small id="count">题库载入中</small>50题 / 100分</div></div><div class="card"><h2>开始答题</h2><p>请输入姓名后开始。排行榜记录每一次提交，不按个人最高分合并。</p><button class="ghost" onclick="showRank()">查看排行榜</button><label>姓名</label><input id="name" type="text" placeholder="请输入姓名"><button class="pri" onclick="start()">开始随机抽题</button><button class="sec" onclick="clearRank()">清空本机记录</button><p>当前网页为静态网址，排行榜保存于本机浏览器；换设备或清浏览器数据后会重置。</p></div></section><section id="quiz" class="hidden"><div class="top"><div class="bar"><b id="meta">答题中</b><span id="prog">已答 0/50　00:00</span></div></div><form id="form"></form><div class="card"><button type="button" class="sec" onclick="backHome()">返回首页</button><button type="button" class="pri" onclick="submitQuiz()">提交并查看结果</button></div></section><section id="result" class="hidden"><div class="card"><h2>本次成绩</h2><div class="score"><span id="score">0</span><small>/100</small></div><p id="rmeta"></p><button class="pri" onclick="again()">再答一次</button><button class="sec" onclick="review(true)">只看错题</button><button class="ghost" onclick="review(false)">查看全部答案</button><button class="ghost" onclick="showRank()">排行榜</button></div><div id="review"></div></section><section id="rank" class="hidden"><div class="card"><h2>排行榜</h2><p>每次答题单独排行；同分按提交时间先后排序。</p><button class="sec" onclick="goBack()">返回</button></div><div id="pod" class="pod"></div><div class="card"><table><thead><tr><th>排名</th><th>姓名</th><th>得分</th><th>正确数</th><th>提交时间</th></tr></thead><tbody id="rows"></tbody></table></div></section></div><script>window.__QB=[];</script>

<script src="q1.js"></script>
<script src="q2.js"></script>
<script src="q3.js"></script>
<script src="q4.js"></script>
<script src="q5.js"></script>
<script src="q6.js"></script>

<script>
const D=JSON.parse(window.__QB.join('')),N=50,KEY='nse_quiz_rank_v2';let cur=[],ans={},startAt=0,timer=null,last=null,prev='home';const $=id=>document.getElementById(id);function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function sw(id){['home','quiz','result','rank'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden');scrollTo(0,0)}function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function fmt(iso){let d=new Date(iso),p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`}function elapsed(){let s=Math.floor((Date.now()-startAt)/1000);return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}function collect(){cur.forEach((q,i)=>{ans[i]=[...document.querySelectorAll(`[name=q${i}]:checked`)].map(x=>x.value).sort().join('')});let n=Object.values(ans).filter(Boolean).length;$('prog').textContent=`已答 ${n}/${cur.length}　${elapsed()}`}function start(){let name=$('name').value.trim();if(!name){alert('请先输入姓名');return}cur=sh(D).slice(0,N);ans={};startAt=Date.now();clearInterval(timer);timer=setInterval(collect,1000);$('meta').textContent=name+' 的答题卷';$('form').innerHTML=cur.map((q,i)=>{let mult=q[0].length>1,type=mult?'checkbox':'radio';return `<div class=q><div class=type>第 ${i+1} 题 · ${mult?'多选题':'单选题'}</div><div class=qt>${esc(q[1])}</div>${['A','B','C','D'].map((l,k)=>`<label class=opt><input type=${type} name=q${i} value=${l}><b>${l}</b><span>${esc(q[k+2])}</span></label>`).join('')}</div>`}).join('');$('form').onchange=collect;collect();sw('quiz')}function backHome(){if(confirm('确认退出本次答题吗？')){clearInterval(timer);sw('home')}}function text(q,a){return a?a.split('').map(l=>l+'. '+q['ABCD'.indexOf(l)+2]).join('；'):'未作答'}function submitQuiz(){collect();let un=cur.length-Object.values(ans).filter(Boolean).length;if(un&& !confirm(`还有 ${un} 题未答，确认提交吗？`))return;clearInterval(timer);let det=cur.map((q,i)=>({i,q,u:ans[i]||'',ok:(ans[i]||'')===q[0]})),c=det.filter(x=>x.ok).length;last={name:$('name').value.trim(),score:c*2,correct:c,total:cur.length,details:det,time:new Date().toISOString(),dur:elapsed()};let r=load();r.push({name:last.name,score:last.score,correct:c,total:cur.length,time:last.time});localStorage.setItem(KEY,JSON.stringify(r));$('score').textContent=last.score;$('rmeta').textContent=`正确 ${c}/${cur.length} 题，错题 ${cur.length-c} 题，用时 ${last.dur}。提交时间：${fmt(last.time)}`;review(false);sw('result')}function review(wrong){let arr=wrong?last.details.filter(x=>!x.ok):last.details;$('review').innerHTML=arr.length?arr.map(x=>`<div class="q"><div><b>第 ${x.i+1} 题</b> <span class=${x.ok?'ok':'bad'}>${x.ok?'正确':'错误'}</span></div><div class=qt>${esc(x.q[1])}</div><p>你的答案：${esc(text(x.q,x.u))}<br>正确答案：${esc(text(x.q,x.q[0]))}</p></div>`).join(''):'<div class=card>本次没有错题。</div>'}function again(){sw('home')}function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]}}function sorted(){return load().sort((a,b)=>b.score-a.score||new Date(a.time)-new Date(b.time))}function showRank(){prev=$('result').classList.contains('hidden')?'home':'result';let r=sorted();$('pod').innerHTML=r.slice(0,3).map((x,i)=>`<div class="medal m${i+1}"><div style="font-size:34px">${['🥇','🥈','🥉'][i]}</div><div>${esc(x.name)}</div><div style="font-size:32px">${x.score}分</div><div>${fmt(x.time)}</div></div>`).join('');$('rows').innerHTML=r.map((x,i)=>`<tr><td>${i+1}</td><td>${esc(x.name)}</td><td><b>${x.score}</b></td><td>${x.correct}/${x.total}</td><td>${fmt(x.time)}</td></tr>`).join('')||'<tr><td colspan=5>暂无记录</td></tr>';sw('rank')}function goBack(){sw(prev)}function clearRank(){if(confirm('确认清空本机排行榜？')){localStorage.removeItem(KEY);alert('已清空')}}$('count').textContent='题库共 '+D.length+' 题';
</script></body></html>
